<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mystic Tarot - Scribd Logic Edition</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/121/121303.png">
    <style>
        :root { --gold: #ffd700; --purple: #2d0b5a; --dark: #0f051d; --text: #f0f0f0; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1a0836; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); max-width: 500px; width: 100%; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { color: var(--gold); display: block; margin-bottom: 8px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid var(--gold); background: #0f051d; color: white; box-sizing: border-box; font-size: 1em; }
        .yellow-btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2em; margin-top: 15px; box-shadow: 0 5px 15px rgba(255,215,0,0.2); }
        .hidden { display: none !important; }
        .card-row { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .card { width: 100px; height: 170px; border: 2px solid var(--gold); border-radius: 12px; background: #311b92; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .card.flipped img { display: block; }
        .card.flipped span { display: none; }
        .card span { font-size: 2.5em; color: var(--gold); }
        .result-box { margin-top: 25px; padding: 25px; background: rgba(0,0,0,0.7); border-radius: 20px; text-align: left; border-top: 5px solid var(--gold); line-height: 1.9; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen1">
        <h1 style="color: var(--gold);">🔮 AI Mystic Oracle</h1>
        <div class="input-group">
            <label>ဘာအကြောင်း သိချင်တာလဲ?</label>
            <select id="topic">
                <option value="Love">❤️ အချစ်ရေး (Relationship)</option>
                <option value="Health">⚕️ ကျန်းမာရေး (Health)</option>
                <option value="Edu">🎓 ပညာရေး (Education)</option>
                <option value="Work">💼 အလုပ်အကိုင် (Career)</option>
            </select>
        </div>
        <div class="input-group">
            <label>မွေးသက္ကရာဇ် (Birthday)</label>
            <input type="date" id="dob">
        </div>
        <div class="input-group">
            <label>သိလိုသော မေးခွန်း (Question)</label>
            <textarea id="question" rows="2" placeholder="မေးခွန်းရေးပါ..."></textarea>
        </div>
        <button class="yellow-btn" onclick="startReading()">ကံကြမ္မာကို စစ်ဆေးမည်</button>
    </div>

    <div id="screen2" class="hidden">
        <h3 id="zodiac-info" style="color: var(--gold);"></h3>
        <p>ကတ် (၃) ကတ်ကို ရွေးချယ်ပါ</p>
        <div class="card-row">
            <div id="c1" class="card" onclick="pick(1)"><span>✨</span><img id="img1"></div>
            <div id="c2" class="card" onclick="pick(2)"><span>✨</span><img id="img2"></div>
            <div id="c3" class="card" onclick="pick(3)"><span>✨</span><img id="img3"></div>
        </div>
        <div id="output" class="result-box hidden"></div>
        <button id="reset" class="yellow-btn hidden" onclick="location.reload()">အစမှ ပြန်မေးမည်</button>
    </div>
</div>
<script>
    const tarotDB = [];
    const majors = ["The Fool", "The Magician", "High Priestess", "Empress", "Emperor", "Hierophant", "Lovers", "Chariot", "Strength", "Hermit", "Wheel", "Justice", "Hanged Man", "Death", "Temperance", "Devil", "Tower", "Star", "Moon", "Sun", "Judgement", "World"];
    const suits = ["Wands", "Cups", "Swords", "Pentacles"];

    // Meanings from Scribd Documents
    const meanings = {
        Major: { Love: "ကြီးမားသော ချစ်ခြင်း၊ ကံကြမ္မာဆုံဆည်းမှု။", Health: "စိတ်ဓာတ်အင်အားက ခန္ဓာကိုယ်ကို ကုသပေးမည်။", Edu: "အဓိက ပညာရပ်တစ်ခုတွင် ထူးချွန်မည်။", Work: "ဘဝရည်မှန်းချက် မြင့်မားစွာ အောင်မြင်မည်။" },
        Wands: { Love: "စိတ်လှုပ်ရှားဖွယ် ဆက်ဆံရေး၊ တက်ကြွမှု။", Health: "စွမ်းအင်ပြည့်ဝမှု၊ လေ့ကျင့်ခန်း လိုအပ်ခြင်း။", Edu: "ဖန်တီးမှုပိုင်းဆိုင်ရာတွင် အောင်မြင်မှုရရှိမည်။", Work: "ဦးဆောင်မှုပေးရမည့် အလုပ်သစ်များ ရလာမည်။" },
        Cups: { Love: "နက်ရှိုင်းသော သံယောဇဉ်၊ စိတ်ခံစားမှု။", Health: "စိတ်ဖိစီးမှုကြောင့် ကျန်းမာရေး ထိခိုက်နိုင်။", Edu: "အနုပညာနှင့် လူမှုရေးပညာရပ်များတွင် ထူးချွန်မည်။", Work: "စိတ်ကျေနပ်မှုရစေမည့် လုပ်ငန်းခွင်အခြေအနေ။" },
        Swords: { Love: "ပွင့်လင်းစွာ ဆွေးနွေးရန် လိုအပ်သောအချိန်။", Health: "အတွေးလွန်ခြင်းကြောင့် ခေါင်းကိုက်ခြင်း ဖြစ်နိုင်။", Edu: "ခွဲခြမ်းစိတ်ဖြာမှုပိုင်းတွင် အမှတ်ကောင်းရမည်။", Work: "စိန်ခေါ်မှုများသော ဆုံးဖြတ်ချက်များ ချရမည်။" },
        Pentacles: { Love: "တည်ငြိမ်သော၊ လက်တွေ့ဆန်သော အချစ်။", Health: "အစားအသောက်နှင့် နေထိုင်မှုပုံစံ ဂရုစိုက်ပါ။", Edu: "လက်တွေ့အသုံးချ ပညာရပ်များတွင် အောင်မြင်မည်။", Work: "ငွေကြေးအကျိုးအမြတ်နှင့် ရာထူးတက်ခြင်း။" }
    };

    const zodiacs = [
        {n: "မိဿ (Aries)", k: "Aries", m: 3, d: 21, em: 4, ed: 19}, {n: "ပြိဿ (Taurus)", k: "Taurus", m: 4, d: 20, em: 5, ed: 20},
        {n: "မေထုန် (Gemini)", k: "Gemini", m: 5, d: 21, em: 6, ed: 20}, {n: "ကရကဋ် (Cancer)", k: "Cancer", m: 6, d: 21, em: 7, ed: 22},
        {n: "သိဟ် (Leo)", k: "Leo", m: 7, d: 23, em: 8, ed: 22}, {n: "ကန် (Virgo)", k: "Virgo", m: 8, d: 23, em: 9, ed: 22},
        {n: "တူ (Libra)", k: "Libra", m: 9, d: 23, em: 10, ed: 22}, {n: "ဗြိစ္ဆာ (Scorpio)", k: "Scorpio", m: 10, d: 23, em: 11, ed: 21},
        {n: "ဓနု (Sagittarius)", k: "Sagittarius", m: 11, d: 22, em: 12, ed: 21}, {n: "မကာရ (Capricorn)", k: "Capricorn", m: 12, d: 22, em: 1, ed: 19},
        {n: "ကုံ (Aquarius)", k: "Aquarius", m: 1, d: 20, em: 2, ed: 18}, {n: "မိန် (Pisces)", k: "Pisces", m: 2, d: 19, em: 3, ed: 20}
    ];

    // Build Database (78 Cards)
    majors.forEach((m, i) => tarotDB.push({ n: m, u: 'https://raw.githubusercontent.com/htanmo/tarot-images/main/cards/m${i}.jpg', type: "Major" }));
    suits.forEach(s => { for(let i=1; i<=14; i++) tarotDB.push({ n: i+" of "+s, u: 'https://raw.githubusercontent.com/htanmo/tarot-images/main/cards/${s.toLowerCase()}${i}.jpg', type: s }); });

    let currentZodiac = null, birthSeed = 0;

    function startReading() {
        const d = document.getElementById('dob').value;
        if(!d) return alert("မွေးနေ့ ထည့်ပါဦးဗျာ။");
        const date = new Date(d);
        birthSeed = date.getTime();
        const m = date.getUTCMonth() + 1, dy = date.getUTCDate();
        
        currentZodiac = zodiacs.find(z => (m == z.m && dy >= z.d) || (m == z.em && dy <= z.ed));
        
        document.getElementById('zodiac-info').innerText = "✨ ရာသီခွင်: " + currentZodiac.n;
        document.getElementById('screen1').classList.add('hidden'); // Page Switch
        document.getElementById('screen2').classList.remove('hidden');
    }

    let picked = [];
    function pick(num) {
        const el = document.getElementById('c'+num);
        if(el.classList.contains('flipped') || picked.length >= 3) return;

        // Deterministic Picking based on birthSeed
        const idx = Math.floor((Math.abs(Math.sin(birthSeed + num)) * 1000) % 78);
        const card = tarotDB[idx];
        picked.push(card);
        
        document.getElementById('img'+num).src = card.u;
        el.classList.add('flipped');

        if(picked.length === 3) showFinalResult();
    }
                        function showFinalResult() {
        const topic = document.getElementById('topic').value;
        const topicName = document.getElementById('topic').options[document.getElementById('topic').selectedIndex].text;
        
        let res = <center><h3 style="color:var(--gold)">🔮 Scribd Mystic Analysis</h3></center>;
        res += <b>ရာသီခွင်:</b> ${currentZodiac.n}<br>;
        res += <b>ရွေးချယ်ထားသော ကဏ္ဍ:</b> ${topicName}<br><hr>;

        picked.forEach((p, i) => {
            const label = ["အတိတ်", "ပစ္စုပ္ပန်", "အနာဂတ်"][i];
            const answer = meanings[p.type][topic]; // Topic-specific answer logic
            res += <p><b>${label}: ${p.n}</b><br>သင်ရွေးချယ်ထားသော ${topicName} ပိုင်းတွင် ${answer}</p>;
        });

        document.getElementById('output').innerHTML = res;
        document.getElementById('output').classList.remove('hidden');
        document.getElementById('reset').classList.remove('hidden');
    }
</script>
</body>
</html>
