<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mystic Tarot - 78 Cards Edition</title>
    <style>
        :root { --gold: #ffd700; --purple: #2d0b5a; --dark: #0f051d; --text: #f0f0f0; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(45, 11, 90, 0.95); padding: 25px; border-radius: 20px; border: 2px solid var(--gold); max-width: 500px; width: 90%; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { color: var(--gold); display: block; margin-bottom: 5px; font-size: 0.9em; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #1a0836; color: white; box-sizing: border-box; }
        
        /* အဝါရောင် Button */
        .yellow-btn { background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 15px; transition: 0.3s; }
        .yellow-btn:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }
        
        .hidden { display: none !important; }
        
        /* Cards Animation */
        .card-container { display: flex; justify-content: center; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
        .card { width: 90px; height: 155px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 2px solid var(--gold); }
        .card-back { background: #311b92; display: flex; align-items: center; justify-content: center; font-size: 2em; color: var(--gold); }
        .card-front img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

        .result-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.7); border-radius: 12px; border-left: 5px solid var(--gold); text-align: left; line-height: 1.8; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1 style="color: var(--gold); margin-top: 0;">🔮 AI Mystic Oracle</h1>
        <div class="input-group">
            <label>ဘာအကြောင်း သိချင်တာလဲ?</label>
            <select id="topic">
                <option value="Love">❤️ အချစ်ရေးနှင့် လူမှုရေး</option>
                <option value="Money">💰 စီးပွားရေးနှင့် ငွေကြေး</option>
                <option value="Health">💪 ကျန်းမာရေးနှင့် အထွေထွေ</option>
            </select>
        </div>
        <div class="input-group">
            <label>မွေးသက္ကရာဇ်</label>
            <input type="date" id="dob">
        </div>
        <div class="input-group">
            <label>မေးမြန်းလိုသည့် မေးခွန်း</label>
            <textarea id="question" rows="2" placeholder="ဥပမာ- ကျွန်တော် အလုပ်အဆင်ပြေပါ့မလား?"></textarea>
        </div>
        <button class="yellow-btn" onclick="switchScreen()">ကံကြမ္မာကို စစ်ဆေးမည်</button>
    </div>

    <div id="card-screen" class="hidden">
        <h3 style="color: var(--gold);">ကတ် (၃) ကတ်ကို ရွေးချယ်ပါ</h3>
        <p style="font-size: 0.85em;">အတိတ်၊ ပစ္စုပ္ပန်၊ အနာဂတ်အတွက် အာရုံပြုနှိပ်ပါ</p>
        <div class="card-container">
            <div class="card" onclick="pickCard(this, 1)"><div class="card-inner"><div class="card-back">✨</div><div class="card-front"><img id="img1"></div></div></div>

            <div class="card" onclick="pickCard(this, 2)"><div class="card-inner"><div class="card-back">✨</div><div class="card-front"><img id="img2"></div></div></div>
            <div class="card" onclick="pickCard(this, 3)"><div class="card-inner"><div class="card-back">✨</div><div class="card-front"><img id="img3"></div></div></div>
        </div>
        <div id="final-result" class="result-box"></div>
        <button id="reset-btn" class="yellow-btn hidden" onclick="location.reload()">အစမှ ပြန်မေးမည်</button>
    </div>
</div>

<script>
    // Full 78 Cards Structure
    const tarotDeck = [];
    const majorNames = ["The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor", "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit", "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance", "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"];
    const suits = ["Wands", "Cups", "Swords", "Pentacles"];
    const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Page", "Knight", "Queen", "King"];

    // Build 78 cards with category-specific responses
    // Major Arcana
    majorNames.forEach((name, i) => {
        tarotDeck.push({
            n: name,
            u: https://upload.wikimedia.org/wikipedia/en/${i < 10 ? '9/90/RWS_Tarot_00_Fool.jpg' : 'd/de/RWS_Tarot_01_Magician.jpg'}, // Placeholder logic - will fix below
            u: https://upload.wikimedia.org/wikipedia/en/thumb/${getMajorImg(i)},
            m: { Love: name + " အရ အချစ်ရေးမှာ အပြောင်းအလဲသစ်တွေ တွေ့ရမယ်။", Money: name + " က ငွေကြေးကံကောင်းမှုကို ပြနေပါတယ်။", Health: name + " အရ ကျန်းမာရေး ဂရုစိုက်သင့်ပါတယ်။" }
        });
    });

    // Fix Major Arcana Images
    function getMajorImg(i) {
        const paths = ["9/90/RWS_Tarot_00_Fool.jpg", "d/de/RWS_Tarot_01_Magician.jpg", "8/88/RWS_Tarot_02_High_Priestess.jpg", "d/d2/RWS_Tarot_03_Empress.jpg", "c/c3/RWS_Tarot_04_Emperor.jpg", "8/8d/RWS_Tarot_05_Hierophant.jpg", "d/db/RWS_Tarot_06_Lovers.jpg", "9/9b/RWS_Tarot_07_Chariot.jpg", "f/f2/RWS_Tarot_08_Strength.jpg", "4/4d/RWS_Tarot_09_Hermit.jpg", "3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", "e/e0/RWS_Tarot_11_Justice.jpg", "2/2b/RWS_Tarot_12_Hanged_Man.jpg", "d/d7/RWS_Tarot_13_Death.jpg", "f/f8/RWS_Tarot_14_Temperance.jpg", "5/55/RWS_Tarot_15_Devil.jpg", "9/9b/RWS_Tarot_16_Tower.jpg", "d/db/RWS_Tarot_17_Star.jpg", "f/f3/RWS_Tarot_18_Moon.jpg", "1/17/RWS_Tarot_19_Sun.jpg", "d/dd/RWS_Tarot_20_Judgement.jpg", "f/ff/RWS_Tarot_21_World.jpg"];
        return paths[i];
    }

    // Minor Arcana (Simplified images for stability)
    suits.forEach(s => {
        ranks.forEach((r, idx) => {
            tarotDeck.push({
                n: ${r} of ${s},
                u: https://upload.wikimedia.org/wikipedia/en/${s === 'Pentacles' ? 'Penta' : s}${String(idx + 1).padStart(2, '0')}.jpg,
                m: { Love: ${s} ကဒ်အရ အချစ်ရေးမှာ စိတ်လှုပ်ရှားစရာတွေလာမယ်။, Money: ${s} ကဒ်က စီးပွားရေး တိုးတက်မှုကို ပြပါတယ်။, Health: "ကျန်းမာရေး ပုံမှန်ရှိနေပါတယ်။" }
            });
        });
    });

    let selected = [];

    // ပထမမျက်နှာပြင်မှ ဒုတိယသို့ ပြောင်းခြင်း
    function switchScreen() {
        const dob = document.getElementById('dob').value;
        if(!dob) return alert("မွေးသက္ကရာဇ် ရွေးပေးပါဦးဗျာ။");
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }

    // ကတ်နှိပ်ခြင်း logic
    function pickCard(el, num) {
        if(el.classList.contains('flipped') || selected.length >= 3) return;

        const dob = document.getElementById('dob').value;
        const q = document.getElementById('question').value;
        const topic = document.getElementById('topic').value;
        
        // Random Seed Logic
        const seed = new Date(dob).getTime() + q.length + (num * 17);
        const idx = Math.floor((Math.abs(Math.sin(seed)) * 1000) % 78);
        const card = tarotDeck[idx];

    selected.push(card);
        document.getElementById('img'+num).src = card.u;
        el.classList.add('flipped');

        if(selected.length === 3) {
            setTimeout(showHoro, 800);
        }
    }

    function showHoro() {
        const topic = document.getElementById('topic').value;
        const resultDiv = document.getElementById('final-result');
        let html = <strong>🔮 AI ၏ ဟောစာတမ်း</strong><br><br>;
        
        selected.forEach((c, i) => {
            const label = i === 0 ? "အတိတ်" : i === 1 ? "ပစ္စုပ္ပန်" : "အနာဂတ်";
            html += <b>${label}: ${c.n}</b><br>ဟောချက်: ${c.m[topic]}<br><br>;
        });

        resultDiv.innerHTML = html;
        resultDiv.style.display = "block";
        document.getElementById('reset-btn').classList.remove('hidden');
    }
</script>

</body>
</html>
