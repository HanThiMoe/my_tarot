<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mystic Tarot - အဆင့်မြင့် ဟောစတမ်း</title>
    <style>
        :root { --gold: #ffd700; --purple: #2d0b5a; --dark: #0f051d; --text: #e0e0e0; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { background: rgba(45, 11, 90, 0.9); padding: 30px; border-radius: 20px; border: 2px solid var(--gold); max-width: 600px; width: 95%; box-shadow: 0 0 50px rgba(0,0,0,1); text-align: center; }
        h1 { color: var(--gold); text-shadow: 0 0 10px var(--gold); margin-bottom: 10px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { color: var(--gold); font-size: 0.9em; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--gold); background: #1a0836; color: white; box-sizing: border-box; font-family: inherit; }
        button { background: linear-gradient(45deg, #ffd700, #b8860b); color: #000; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 10px; }
        
        /* Tarot Cards */
        .card-container { display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .card { width: 100px; height: 160px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid var(--gold); }
        .card-back { background: #4a148c; display: flex; align-items: center; justify-content: center; font-size: 2em; color: var(--gold); }
        .card-front { transform: rotateY(180deg); background: white; overflow: hidden; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        .result-box { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 15px; border-left: 5px solid var(--gold); text-align: left; line-height: 1.8; display: none; }
        .loading { display: none; color: var(--gold); margin: 20px; font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 AI Mystic Tarot</h1>
    <div id="setup-screen">
        <div class="input-group">
            <label>သိလိုသော ကဏ္ဍ</label>
            <select id="topic">
                <option value="အချစ်ရေး">❤️ အချစ်ရေး</option>
                <option value="စီးပွားရေး">💰 စီးပွားရေး/ငွေကြေး</option>
                <option value="ကျန်းမာရေး">💪 ကျန်းမာရေး</option>
                <option value="အလုပ်အကိုင်">💼 အလုပ်အကိုင်</option>
            </select>
        </div>
        <div class="input-group">
            <label>မွေးသက္ကရာဇ်</label>
            <input type="date" id="dob">
        </div>
        <div class="input-group">
            <label>မေးမြန်းလိုသည့် မေးခွန်း</label>
            <textarea id="question" rows="3" placeholder="ဥပမာ- ကျွန်တော် အခုလုပ်နေတဲ့ အလုပ်မှာ အောင်မြင်ပါ့မလား?"></textarea>
        </div>
        <button onclick="goToCards()">နတ်မင်းကြီးထံ မေးမြန်းမည်</button>
    </div>

    <div id="card-screen" class="hidden">
        <h3 id="zodiac-info" style="color: var(--gold);"></h3>
        <p>မင်းရဲ့ မေးခွန်းအတွက် အာရုံပြုပြီး ကဒ် (၃) ကဒ်ကို ရွေးချယ်ပါ</p>
        <div class="card-container">
            <div class="card" id="c1" onclick="selectCard(0, this)">
                <div class="card-inner"><div class="card-back">✨</div><div class="card-front"><img src=""></div></div>
            </div>
            <div class="card" id="c2" onclick="selectCard(1, this)">
                <div class="card-inner"><div class="card-back">✨</div><div class="card-front"><img src=""></div></div>
            </div>
            <div class="card" id="c3" onclick="selectCard(2, this)">
                <div class="card-inner"><div class="card-back">✨</div><div class="card-front"><img src=""></div></div>
            </div>
        </div>
        <div class="loading" id="loader">AI က မင်းရဲ့ ကံကြမ္မာကို တွက်ချက်နေပါတယ်...</div>
        <div id="result" class="result-box"></div>
        <button id="reset-btn" class="hidden" onclick="location.reload()">တစ်ခါပြန်မေးမည်</button>
    </div>
</div>

<script>
    const tarotDB = [
        { name: "The Sun", img: "https://upload.wikimedia.org/wikipedia/en/1/17/RWS_Tarot_19_Sun.jpg", power: "အောင်မြင်ခြင်း၊ ပျော်ရွှင်ခြင်း" },
        { name: "The Moon", img: "https://upload.wikimedia.org/wikipedia/en/f/f3/RWS_Tarot_18_Moon.jpg", power: "မရေရာမှု၊ စိတ်သောက" },
        { name: "The Tower", img: "https://upload.wikimedia.org/wikipedia/en/9/9b/RWS_Tarot_16_Tower.jpg", power: "ရုတ်တရက်ပြောင်းလဲခြင်း" },
        { name: "The Lovers", img: "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_06_Lovers.jpg", power: "ရွေးချယ်မှု၊ သံယောဇဉ်" },
        { name: "Death", img: "https://upload.wikimedia.org/wikipedia/en/d/d7/RWS_Tarot_13_Death.jpg", power: "အဆုံးသတ်နှင့် အသစ်စတင်ခြင်း" },
        { name: "The Magician", img: "https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg", power: "စွမ်းဆောင်ရည်၊ ကြံရည်ဖန်ရည်" }
    ];

    const zodiacData = {
        "Aries": "စိတ်အားထက်သန်ပြီး ခေါင်းဆောင်လိုစိတ်ရှိသူ",
        "Taurus": "တည်ငြိမ်ပြီး စိတ်ချရသူ၊ အကြံအဖန်ကောင်းသူ",
        "Gemini": "ဖျတ်လတ်ပြီး ဆက်ဆံရေးကောင်းသူ",
        "Cancer": "စိတ်ခံစားမှုနက်နဲပြီး မိသားစုကို ချစ်ခင်သူ",
        "Leo": "ရဲရင့်ပြီး ထင်ပေါ်ကျော်ကြားလိုသူ",
        "Virgo": "စနစ်တကျရှိပြီး အသေးစိတ်ကို ဂရုစိုက်သူ",
        "Libra": "မျှတမှုကို မြတ်နိုးပြီး အလှအပကြိုက်သူ",
        "Scorpio": "လျှို့ဝှက်ချက်များပြီး သန္နိဋ္ဌာန်ပြတ်သားသူ",
        "Sagittarius": "လွတ်လပ်မှုကို ချစ်ပြီး စွန့်စားလိုသူ",
        "Capricorn": "ရည်မှန်းချက်ကြီးပြီး အလုပ်ကြိုးစားသူ",
        "Aquarius": "ထူးခြားဆန်းသစ်ပြီး လူသားချင်းစာနာသူ",
        "Pisces": "စိတ်ကူးယဉ်ဆန်ပြီး ကြင်နာတတ်သူ"
    };

    let selectedCards = [];
    let userZodiac = "";

    function getZodiac(date) {
        const d = new Date(date);
        const m = d.getMonth() + 1, dy = d.getDate();
        if ((m == 3 && dy >= 21) || (m == 4 && dy <= 19)) return "Aries";
        if ((m == 4 && dy >= 20) || (m == 5 && dy <= 20)) return "Taurus";
        if ((m == 5 && dy >= 21) || (m == 6 && dy <= 20)) return "Gemini";
        if ((m == 6 && dy >= 21) || (m == 7 && dy <= 22)) return "Cancer";
        if ((m == 7 && dy >= 23) || (m == 8 && dy <= 22)) return "Leo";
        if ((m == 8 && dy >= 23) || (m == 9 && dy <= 22)) return "Virgo";
        if ((m == 9 && dy >= 23) || (m == 10 && dy <= 22)) return "Libra";
        if ((m == 10 && dy >= 23) || (m == 11 && dy <= 21)) return "Scorpio";
        if ((m == 11 && dy >= 22) || (m == 12 && dy <= 21)) return "Sagittarius";
        if ((m == 12 && dy >= 22) || (m == 1 && dy <= 19)) return "Capricorn";
        if ((m == 1 && dy >= 20) || (m == 2 && dy <= 18)) return "Aquarius";
        return "Pisces";
    }

    function goToCards() {
        const dob = document.getElementById('dob').value;
        if(!dob) return alert("မွေးရက်ထည့်ပါဦးဗျာ");
        userZodiac = getZodiac(dob);
        document.getElementById('zodiac-info').innerText = သင်သည် ${userZodiac} ရာသီဖွား ဖြစ်ပါသည်။ (${zodiacData[userZodiac]});
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }
    function selectCard(index, el) {
        if(el.classList.contains('flipped') || selectedCards.length >= 3) return;
        
        // Seed based on birthday to keep result consistent for same person
        const dob = document.getElementById('dob').value;
        const seed = new Date(dob).getTime() + index;
        const cardIndex = Math.floor((Math.abs(Math.sin(seed)) * 1000) % tarotDB.length);
        const card = tarotDB[cardIndex];

        selectedCards.push(card);
        el.querySelector('img').src = card.img;
        el.classList.add('flipped');

        if(selectedCards.length === 3) {
            document.getElementById('loader').style.display = 'block';
            setTimeout(generateAIResult, 2000);
        }
    }

    function generateAIResult() {
        const topic = document.getElementById('topic').value;
        const question = document.getElementById('question').value || "အနာဂတ်အခြေအနေ";
        const resBox = document.getElementById('result');
        
        // AI Logic Simulation
        const c1 = selectedCards[0], c2 = selectedCards[1], c3 = selectedCards[2];
        const zodiacTrait = zodiacData[userZodiac];

        let aiResponse = <strong>နတ်မင်းကြီး၏ AI ဟောစာတမ်း</strong><br><br>;
        aiResponse += သင်ဟာ ${userZodiac} ရာသီဖွားဖြစ်ပြီး ${zodiacTrait} တစ်ယောက်ဖြစ်တဲ့အတွက် ${topic} နဲ့ ပတ်သက်ပြီး အရမ်းကို အလေးအနက်ထားတတ်သူပါ။<br><br>;
        aiResponse += မေးခွန်း: "<em>${question}</em>" အပေါ်မှာ ကျလာတဲ့ ကဒ်တွေကို ကြည့်ရင်-<br>;
        aiResponse += ၁။ <strong>${c1.name}</strong> ကဒ်အရ မင်းရဲ့ အတိတ်က အခြေအနေဟာ ${c1.power} တွေနဲ့ ပြည့်နှက်နေခဲ့ပါတယ်။<br>;
        aiResponse += ၂။ လက်ရှိမှာ <strong>${c2.name}</strong> ကျလာတဲ့အတွက် ${c2.power} ကို အထူးသတိထားဖို့ လိုပါတယ်။<br>;
        aiResponse += ၃။ မင်းရဲ့ အနာဂတ်အတွက် <strong>${c3.name}</strong> ကဒ်က နိမိတ်ပြနေတာကတော့ ${c3.power} ပဲ ဖြစ်ပါတယ်။<br><br>;
        aiResponse += <strong>နိဂုံးချုပ် အကြံပြုချက်:</strong> မင်းရဲ့ ${userZodiac} သဘာဝအတိုင်း စိတ်ရှည်သည်းခံပြီး ${c3.power} ကို ရရှိအောင် ကြိုးစားပါ။ မကြာခင် မင်းရဲ့ ${topic} ကဏ္ဍမှာ ထူးခြားတဲ့ အပြောင်းအလဲတစ်ခု ကြုံရပါလိမ့်မယ်။;

        document.getElementById('loader').style.display = 'none';
        resBox.innerHTML = aiResponse;
        resBox.style.display = 'block';
        document.getElementById('reset-btn').classList.remove('hidden');
    }
</script>

</body>
</html>
